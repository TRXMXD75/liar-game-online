<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>كذاب Pro - أونلاين</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root { --poker-green: #1a4a1a; --gold: #ffd700; --accent: #ff4444; }
        body { font-family: 'Cairo', sans-serif; background: #0f2027; color: white; margin: 0; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }
        #lobby { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 2000; display: flex; align-items: center; justify-content: center; }
        .setup-box { background: var(--poker-green); padding: 30px; border-radius: 20px; border: 3px solid var(--gold); text-align: center; max-width: 90%; }
        .table { width: 85vw; height: 40vh; background: radial-gradient(#2d5a27, #132a13); border: 10px solid #3d2b1f; border-radius: 150px; position: relative; display: flex; align-items: center; justify-content: center; margin: 20px auto; }
        .hand { height: 160px; display: flex; justify-content: center; padding: 10px; background: rgba(0,0,0,0.4); overflow-x: auto; gap: 5px; }
        .card { width: 60px; height: 90px; background: white; border-radius: 8px; color: black; transition: 0.3s; border: 1px solid #999; display: flex; flex-direction: column; justify-content: space-between; padding: 5px; font-weight: bold; cursor: pointer; flex-shrink: 0; }
        .card.selected { transform: translateY(-30px); border: 3px solid var(--gold); box-shadow: 0 0 10px var(--gold); }
        .pot-card { position: absolute; width: 50px; height: 75px; background: #333; border: 1px solid #555; border-radius: 5px; transform: rotate(var(--r)); }
        .controls { padding: 15px; background: #000; display: flex; justify-content: center; gap: 10px; align-items: center; }
        button { padding: 10px 20px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; }
        .btn-gold { background: var(--gold); color: black; }
        .btn-red { background: var(--accent); color: white; }
        input { padding: 10px; border-radius: 5px; border: none; width: 150px; text-align: center; }
    </style>
</head>
<body>

    <div id="lobby">
        <div class="setup-box" id="initial-setup">
            <h1>كذاب Pro أونلاين 🌐</h1>
            <button class="btn-gold" onclick="startHost()">إنشاء غرفة (Host)</button>
            <p>أو</p>
            <input type="text" id="join-id" placeholder="كود الغرفة">
            <button class="btn-gold" onclick="joinRoom()">دخول</button>
        </div>
        <div class="setup-box" id="waiting-area" style="display:none;">
            <h2>كود الغرفة: <span id="room-code" style="color:var(--gold); user-select: all;">...</span></h2>
            <p>شارك الكود مع أصحابك</p>
            <p>المتصلون الآن: <span id="peer-count">1</span></p>
            <button class="btn-gold" id="start-game-btn" onclick="broadcastStart()" style="display:none;">ابدأ اللعب!</button>
        </div>
    </div>

    <div id="status-bar" style="text-align: center; padding: 10px; color: var(--gold); font-size: 1.2rem; background: rgba(0,0,0,0.5);">بانتظار البداية...</div>

    <div class="table">
        <div id="pot-container"></div>
        <div id="claim-msg" style="position:absolute; top: -30px; background: var(--gold); color: black; padding: 5px 15px; border-radius: 10px; display: none;"></div>
    </div>

    <div class="hand" id="my-hand"></div>

    <div class="controls">
        <select id="claim-val" style="padding:10px; border-radius:5px;">
            <option value="A">A</option><option value="2">2</option><option value="3">3</option>
            <option value="4">4</option><option value="5">5</option><option value="J">J</option>
            <option value="Q">Q</option><option value="K">K</option>
        </select>
        <button class="btn-gold" onclick="playCards()">رمي الورق</button>
        <button class="btn-red" onclick="callBluff()">كذاب!</button>
    </div>

<script>
    let peer, conn, myId, connections = [];
    let gameState = { players: [], currentPlayer: 0, pot: [], currentClaim: "", lastPlayer: -1, gameStarted: false };
    let isHost = false;
    let myHand = [];
    let selected = [];
    let myIndex = 0;

    // --- الاتصال ---
    function startHost() {
        isHost = true;
        peer = new Peer();
        peer.on('open', id => {
            myId = id;
            document.getElementById('initial-setup').style.display = 'none';
            document.getElementById('waiting-area').style.display = 'block';
            document.getElementById('room-code').innerText = id;
            document.getElementById('start-game-btn').style.display = 'inline-block';
        });
        peer.on('connection', c => {
            connections.push(c);
            document.getElementById('peer-count').innerText = connections.length + 1;
            setupConn(c);
        });
    }

    function joinRoom() {
        const hostId = document.getElementById('join-id').value;
        if(!hostId) return alert("أدخل الكود!");
        peer = new Peer();
        peer.on('open', id => {
            myId = id;
            conn = peer.connect(hostId);
            setupConn(conn);
            document.getElementById('initial-setup').innerHTML = "<h2>تم الاتصال! انتظر المضيف يبدأ...</h2>";
        });
    }

    function setupConn(c) {
        c.on('data', data => {
            if(data.type === 'START') {
                document.getElementById('lobby').style.display = 'none';
                myHand = data.hand;
                gameState = data.state;
                myIndex = data.yourIndex;
                render();
            }
            if(data.type === 'UPDATE') {
                gameState = data.state;
                if(isHost) { // المضيف يعيد إرسال التحديث للجميع
                    connections.forEach(cli => cli.send({ type: 'UPDATE', state: gameState }));
                }
                render();
            }
        });
    }

    // --- منطق اللعبة ---
    function broadcastStart() {
        if(!isHost) return;
        let deck = [];
        const deckRanks = ['A','2','3','4','5','J','Q','K'];
        deckRanks.forEach(r => { for(let i=0; i<4; i++) deck.push(r); });
        deck.sort(() => Math.random() - 0.5);
        
        let totalPlayers = connections.length + 1;
        gameState.players = Array.from({length: totalPlayers}, (_, i) => i);
        gameState.gameStarted = true;

        connections.forEach((c, i) => {
            let playerHand = [];
            for(let j=0; j<4; j++) playerHand.push(deck.pop());
            c.send({ type: 'START', hand: playerHand, state: gameState, yourIndex: i + 1 });
        });
        
        myHand = [];
        for(let j=0; j<4; j++) myHand.push(deck.pop());
        myIndex = 0;
        document.getElementById('lobby').style.display = 'none';
        render();
    }

    function playCards() {
        if(gameState.currentPlayer !== myIndex) return alert("مش دورك!");
        if(selected.length === 0) return alert("اختر ورق!");

        let claim = document.getElementById('claim-val').value;
        if(!gameState.currentClaim) gameState.currentClaim = claim;

        let played = [];
        selected.sort((a,b)=>b-a).forEach(idx => played.push(myHand.splice(idx, 1)[0]));
        
        gameState.pot.push(...played);
        gameState.lastPlayer = myIndex;
        gameState.currentPlayer = (gameState.currentPlayer + 1) % gameState.players.length;
        selected = [];
        
        syncData();
    }

    function callBluff() {
        if(gameState.pot.length === 0 || gameState.lastPlayer === myIndex) return;
        
        // التحقق من الكذب (تبسيط: آخر ورقة في الكومة)
        let isLying = gameState.pot[gameState.pot.length - 1] !== gameState.currentClaim;
        
        alert(isLying ? "قفطته! هو كذاب" : "ظلمته! هو صادق");
        
        // المضيف عادة هو اللي يحسب النتيجة، هنا للتبسيط بنصفر الكومة
        gameState.pot = [];
        gameState.currentClaim = "";
        syncData();
    }

    function syncData() {
        const data = { type: 'UPDATE', state: gameState };
        if(isHost) {
            connections.forEach(c => c.send(data));
        } else {
            conn.send(data);
        }
        render();
    }

    function render() {
        const handEl = document.getElementById('my-hand');
        handEl.innerHTML = '';
        myHand.sort().forEach((card, idx) => {
            const c = document.createElement('div');
            c.className = `card ${selected.includes(idx)?'selected':''}`;
            c.innerHTML = `<span>${card}</span><span style="align-self:flex-end; transform:rotate(180deg)">${card}</span>`;
            c.onclick = () => {
                if(selected.includes(idx)) selected = selected.filter(i=>i!==idx);
                else selected.push(idx);
                render();
            };
            handEl.appendChild(c);
        });

        const status = document.getElementById('status-bar');
        if(gameState.currentPlayer === myIndex) {
            status.innerText = "دورك! ارمِ الورق";
            status.style.color = "#00ff00";
        } else {
            status.innerText = `انتظر دور لاعب ${gameState.currentPlayer + 1}`;
            status.style.color = "white";
        }

        const claimMsg = document.getElementById('claim-msg');
        if(gameState.currentClaim) {
            claimMsg.innerText = `المطلوب: ${gameState.currentClaim}`;
            claimMsg.style.display = "block";
        } else {
            claimMsg.style.display = "none";
        }
        
        const potCont = document.getElementById('pot-container');
        potCont.innerHTML = '';
        gameState.pot.forEach((_, i) => {
            const p = document.createElement('div');
            p.className = 'pot-card';
            p.style.setProperty('--r', `${i * 15}deg`);
            potCont.appendChild(p);
        });
    }
</script>
</body>
</html>
